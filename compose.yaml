name: gamevault

services:
  postgres:
    image: postgres:16.13-alpine3.23
    container_name: postgres
    restart: unless-stopped
    volumes:
      - type: tmpfs
        target: /dev/shm
        tmpfs:
          size: 134217728 # 128*2^20 bytes = 128Mb
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      interval: 30s
      timeout: 5s
      retries: 3
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
    networks:
      - gamevault-net

  minio:
    image: cgr.dev/chainguard/minio:latest-dev
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    networks:
      - gamevault-net

  minio-init:
    image: cgr.dev/chainguard/minio:latest-dev
    container_name: minio-init
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    depends_on:
      minio:
        condition: service_started
    networks:
      - gamevault-net
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for MinIO...';
      until /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; do sleep 2; done;

      echo 'Creating bucket...';
      /usr/bin/mc mb myminio/gamevault-bucket --ignore-existing;

      echo 'Setting public read policy for frontend images...';
      /usr/bin/mc anonymous set download myminio/gamevault-bucket;

      echo 'Creating dedicated backend access keys...';
      /usr/bin/mc admin user add myminio backend-access-key backend-secret-key;
      /usr/bin/mc admin policy attach myminio readwrite --user backend-access-key;

      echo 'MinIO setup complete!';
      exit 0;
      "
  backend:
    build:
      context: ./GameVault-Backend
      no_cache: true
    container_name: backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # PostgreSQL connection
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_URL: ${POSTGRES_URL}
      # MinIO connection
      MINIO_ACCESS_KEY: backend-access-key
      MINIO_SECRET_KEY: backend-secret-key
      MINIO_INTERNAL_URL: http://minio:9000
      MINIO_EXTERNAL_URL: http://localhost:9000
      MINIO_BUCKET: gamevault-bucket
    volumes:
      - ./GameVault-Backend/jwt-keys:/app/jwt-keys
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - gamevault-net
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ./GameVault-Frontend
      no_cache: true
    container_name: frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - gamevault-net
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost/ || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok
    restart: unless-stopped
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    command: "http frontend:80"
    depends_on:
      - frontend
    ports:
      - "4040:4040"
    networks:
      - gamevault-net

  backend-runner:
    image: myoung34/github-runner:latest
    container_name: backend-runner
    restart: unless-stopped
    environment:
      REPO_URL: https://github.com/Kirtasth/GameVault-Backend
      RUNNER_NAME: backend-runner
      ACCESS_TOKEN: ${RUNNER_PAT_TOKEN}
      LABELS: local,docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - gamevault-net

  frontend-runner:
    image: myoung34/github-runner:latest
    container_name: frontend-runner
    restart: unless-stopped
    environment:
      REPO_URL: https://github.com/Kirtasth/GameVault-Frontend
      RUNNER_NAME: frontend-runner
      ACCESS_TOKEN: ${RUNNER_PAT_TOKEN}
      LABELS: local,docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - gamevault-net

networks:
  gamevault-net:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
